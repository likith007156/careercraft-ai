<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#17191c"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <!-- Apricot accent bar -->
  <rect x="100" y="290" width="80" height="6" rx="3" fill="#5d2a1a"/>
  <!-- Main heading -->
  <text x="100" y="260" font-family="Georgia, serif" font-size="72" font-weight="700" fill="white" letter-spacing="-2">CareerCraft <tspan fill="#fbe1d1">AI</tspan></text>
  <!-- Subtitle -->
  <text x="100" y="340" font-family="Inter, Arial, sans-serif" font-size="28" fill="#a3a6af" letter-spacing="0.5">Interview Prep Platform</text>
  <!-- Tags -->
  <rect x="100" y="390" width="160" height="36" rx="18" fill="#ffffff" fill-opacity="0.06"/>
  <text x="180" y="413" font-family="Inter, Arial, sans-serif" font-size="14" fill="#a3a6af" text-anchor="middle">Cognizant · TCS · Infosys</text>
  <rect x="276" y="390" width="140" height="36" rx="18" fill="#ffffff" fill-opacity="0.06"/>
  <text x="346" y="413" font-family="Inter, Arial, sans-serif" font-size="14" fill="#a3a6af" text-anchor="middle">AI · Quiz · CodeLab</text>
  <!-- Right side CC logo -->
  <rect x="950" y="215" width="150" height="150" rx="32" fill="#ffffff" fill-opacity="0.05"/>
  <text x="1025" y="315" font-family="Georgia, serif" font-size="64" font-weight="700" fill="white" text-anchor="middle">CC</text>
  <rect x="975" y="332" width="100" height="4" rx="2" fill="#5d2a1a"/>
</svg>
